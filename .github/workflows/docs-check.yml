name: Documentation Check

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths: ["docs/**", "README.md", ".github/workflows/docs*.yml"]

jobs:
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/.nvmrc
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run build
        env:
          VOLUNTEER_PORTAL_URL: https://volunteers.everybodyeats.nz

      - name: Verify build output
        run: |
          echo "✅ Documentation build completed successfully"
          echo "📊 Build statistics:"
          find dist -name "*.html" | wc -l | xargs echo "HTML pages generated:"
          find dist -name "*.js" -o -name "*.css" | wc -l | xargs echo "Asset files generated:"

  tests-passed:
    name: Tests passed
    runs-on: ubuntu-latest
    needs: docs-check
    if: always()

    steps:
      - name: Validate documentation build
        run: |
          if [[ "${{ needs.docs-check.result }}" == "success" ]]; then
            echo "✅ Documentation build completed successfully"
            echo "📚 All pages generated without errors"  
            echo "🎉 Build validation passed"
            exit 0
          else
            echo "❌ Documentation build failed"
            exit 1
          fi

  # Shared check that both web and docs PRs can use
  merge-check:
    name: Ready to Merge
    runs-on: ubuntu-latest
    needs: docs-check
    if: always()

    steps:
      - name: Check documentation build
        run: |
          if [[ "${{ needs.docs-check.result }}" == "success" ]]; then
            echo "✅ Documentation checks passed"
            exit 0
          else
            echo "❌ Documentation checks failed"
            exit 1
          fi

      - name: Merge requirements satisfied
        run: |
          echo "🎉 All requirements satisfied for docs-only PR"
          echo "✅ Documentation builds successfully"
          echo "✅ No web changes requiring additional tests"
